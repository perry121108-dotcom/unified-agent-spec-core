# GitHub Actions — agent-core Cloud Gate
#
# Auto-generated by `agent-core init` (Phase 6, spec_version >= 0.5.0).
# This workflow hard-blocks any push to `main` / `feature/*` and any pull request
# whose WORKLOG.md cannot satisfy the strong-typed invariants enforced by
# `agent-core check`. Edit with caution — the bootstrap engine WILL NOT overwrite
# a pre-existing file, but the canonical template lives at
# `src/templates/ci-workflow.tpl.yml` inside the unified-agent-spec-core package.

name: agent-core-gate

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main

jobs:
  agent-core-check:
    name: agent-core check (hard gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agent-core (no-op if already vendored)
        run: |
          if [ ! -f "./node_modules/.bin/agent-core" ] && [ ! -f "./dist/bin/agent-core.js" ]; then
            npm install --no-save unified-agent-spec-core || true
          fi

      - name: Run agent-core check (HARD GATE — exit 1 on any invariant violation)
        run: |
          if [ -x "./node_modules/.bin/agent-core" ]; then
            ./node_modules/.bin/agent-core check
          elif [ -f "./dist/bin/agent-core.js" ]; then
            node ./dist/bin/agent-core.js check
          else
            npx --yes unified-agent-spec-core agent-core check
          fi
